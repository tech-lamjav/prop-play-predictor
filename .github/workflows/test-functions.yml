name: Test Edge Functions

# Roda os testes das funções puras (veredito/matching, faixas do resumo, stake)
# em TODO pull request — feedback antes do merge. Os deploys (staging/prod)
# também rodam estes testes como gate (job test, needs: test).
on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run function tests
        run: deno test supabase/functions/tests/

      # Type-check do grafo do webhook (pega import/ref quebrada entre os
      # módulos do split da Onda 6b antes de qualquer deploy)
      - name: Type-check telegram-webhook graph
        # --node-modules-dir=none: resolve npm: pelo cache global do Deno (a
        # raiz do repo tem package.json do app React, sem node_modules no CI)
        run: deno check --node-modules-dir=none supabase/functions/telegram-webhook/index.ts
