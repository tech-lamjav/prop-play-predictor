name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.72.7

      - name: Link Supabase project (production)
        run: supabase link --project-ref ${{ secrets.SUPABASE_PRODUCTION_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply DB migrations (production)
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions (production)
        run: |
          supabase functions deploy injury-insights
          supabase functions deploy stripe-create-checkout --no-verify-jwt
          supabase functions deploy stripe-customer-portal --no-verify-jwt
          supabase functions deploy stripe-verify-session --no-verify-jwt
          supabase functions deploy stripe-webhook --no-verify-jwt
          supabase functions deploy telegram-webhook --no-verify-jwt
          supabase functions deploy whatsapp-webhook --no-verify-jwt
          supabase functions deploy share-create --no-verify-jwt
          supabase functions deploy share-resolve --no-verify-jwt
          supabase functions deploy ingest-wc-scores --no-verify-jwt
          supabase functions deploy notify-kickoff --no-verify-jwt
          supabase functions deploy notify-settlement --no-verify-jwt
          supabase functions deploy winback-backfill --no-verify-jwt
          supabase functions deploy notify-handoff --no-verify-jwt
          supabase functions deploy notify-opportunities --no-verify-jwt
          supabase functions deploy go --no-verify-jwt
          supabase functions deploy mirror-futebol-team-logos --no-verify-jwt
          supabase functions deploy mirror-futebol-player-photos --no-verify-jwt
          supabase functions deploy ingest-fixtures --no-verify-jwt
          supabase functions deploy notify-weekly-summary --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
