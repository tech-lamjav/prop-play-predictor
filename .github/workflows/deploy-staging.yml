name: Deploy Staging

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project (staging)
        run: supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply DB migrations (staging)
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions (staging)
        run: |
          supabase functions deploy injury-insights
          supabase functions deploy stripe-create-checkout
          supabase functions deploy stripe-customer-portal
          supabase functions deploy stripe-verify-session
          supabase functions deploy stripe-webhook
          supabase functions deploy telegram-webhook --no-verify-jwt
          supabase functions deploy whatsapp-webhook --no-verify-jwt
          supabase functions deploy share-create
          supabase functions deploy share-resolve --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
